name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull latest code
        run: |
          if [ ! -d "/opt/meddecode" ]; then
            git clone https://github.com/Astalex-s/Med-Decode-Bot.git /opt/meddecode
          fi
          cd /opt/meddecode
          git pull origin main

      - name: Create .env
        run: |
          cat > /opt/meddecode/.env << 'ENVEOF'
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_URL=postgresql+asyncpg://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@postgres:5432/${{ secrets.DB_NAME }}
          REDIS_HOST=redis
          REDIS_PORT=6379
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          YUKASSA_TOKEN=${{ secrets.YUKASSA_TOKEN }}
          FREE_LIMIT=${{ secrets.FREE_LIMIT }}
          ADMIN_IDS=${{ secrets.ADMIN_IDS }}
          ENVEOF
          sed -i 's/^          //' /opt/meddecode/.env

      - name: Deploy
        run: |
          cd /opt/meddecode
          docker compose up -d --build

      - name: Run migrations
        run: |
          cd /opt/meddecode
          sleep 5
          docker compose exec -T bot alembic upgrade head

      - name: Done
        run: echo "Deployed successfully at $(date)"
