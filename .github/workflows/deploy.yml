name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Если репозиторий ещё не склонирован — клонируем
            if [ ! -d "/opt/meddecode" ]; then
              git clone https://github.com/Astalex-s/Med_Decode_Bot.git /opt/meddecode
            fi

            cd /opt/meddecode

            # Тянем последние изменения
            git pull origin main

            # Пересобираем и перезапускаем бота (без простоя для postgres/redis)
            docker compose pull || true
            docker compose up -d --build --no-deps bot

            # Применяем новые миграции если есть
            docker compose exec -T bot alembic upgrade head

            echo "Deployed successfully at $(date)"
