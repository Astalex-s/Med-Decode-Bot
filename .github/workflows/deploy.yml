name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Если репозиторий ещё не склонирован — клонируем
            if [ ! -d "/opt/meddecode" ]; then
              git clone https://github.com/Astalex-s/Med_Decode_Bot.git /opt/meddecode
            fi

            cd /opt/meddecode

            # Тянем последние изменения
            git pull origin main

            # Создаём .env из переменных окружения (прокинутых через GitHub Secrets)
            cat > .env <<EOF
            BOT_TOKEN=${BOT_TOKEN}
            DB_HOST=postgres
            DB_PORT=5432
            DB_NAME=${DB_NAME}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            DB_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
            REDIS_HOST=redis
            REDIS_PORT=6379
            OPENAI_API_KEY=${OPENAI_API_KEY}
            YUKASSA_TOKEN=${YUKASSA_TOKEN}
            FREE_LIMIT=${FREE_LIMIT}
            ADMIN_IDS=${ADMIN_IDS}
            EOF

            # Пересобираем и перезапускаем бота (без простоя для postgres/redis)
            docker compose up -d --build --no-deps bot

            # Применяем новые миграции если есть
            docker compose exec -T bot alembic upgrade head

            echo "Deployed successfully at $(date)"
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YUKASSA_TOKEN: ${{ secrets.YUKASSA_TOKEN }}
          FREE_LIMIT: ${{ secrets.FREE_LIMIT }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
